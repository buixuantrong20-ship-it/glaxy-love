<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Thảo xinh ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background: linear-gradient(135deg, #fce4ec 0%, #ffebee 100%);
            font-family: 'Poppins', sans-serif; overflow: hidden; text-align: center;
            transition: background 2s ease; 
        }
        body.space-mode { background: radial-gradient(circle at center, #11001c 0%, #000000 100%); color: white; }
        
        #ui-layer {
            position: relative; z-index: 100; padding: 40px; background: rgba(255, 255, 255, 0.4);
            border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: opacity 1s;
        }
        img.main-gif { width: 220px; border-radius: 20px; margin-bottom: 25px; border: 3px solid white; }
        h1 { color: #d81b60; font-size: 2em; margin-bottom: 35px; }
        body.space-mode h1 { color: #ff9a9e; }

        .btn-group { display: flex; justify-content: center; gap: 25px; }
        button { padding: 18px 40px; font-size: 19px; font-weight: 600; border: none; border-radius: 50px; cursor: pointer; transition: 0.2s; }
        #btnYes { background: linear-gradient(135deg, #ff4081 0%, #ff80ab 100%); color: white; z-index: 999; }
        #btnNo { background-color: rgba(255, 255, 255, 0.6); color: #d81b60; border: 2px solid rgba(216, 27, 96, 0.5); z-index: 1000; }

        #universe {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            perspective: 1500px; opacity: 0; pointer-events: none; transition: opacity 2s ease; z-index: 1;
            display: flex; justify-content: center; align-items: center;
        }
        #sphereCanvas { position: absolute; z-index: 2; pointer-events: none; }
        #galaxy { position: absolute; width: 0; height: 0; transform-style: preserve-3d; animation: spinGalaxy 40s linear infinite; z-index: 3; }
        @keyframes spinGalaxy { 0% { transform: rotateX(-10deg) rotateY(0deg); } 100% { transform: rotateX(-10deg) rotateY(360deg); } }
        .star-img { position: absolute; border-radius: 12px; object-fit: cover; border: 4px solid white; }
    </style>
</head>
<body>
    <div id="universe">
        <canvas id="sphereCanvas" width="500" height="500"></canvas>
        <div id="galaxy"></div>
    </div>
    <div id="ui-layer">
        <img id="image" class="main-gif" src="https://media.tenor.com/ZhmAh5s0qHEAAAAi/peach-goma.gif" alt="Cute Cat">
        <h1 id="text">Thảo có muốn nhận quà  của tớ không ? 🎁</h1>
        <div class="btn-group">
            <button id="btnYes">Cóooooo ❤️</button>
            <button id="btnNo">Không thèm 😝</button>
        </div>
    </div>
    <audio id="myAudio" loop preload="auto">
        <source src="nhac.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        const uiLayer = document.getElementById('ui-layer');
        const audio = document.getElementById('myAudio');
        const universe = document.getElementById('universe');
        const galaxy = document.getElementById('galaxy');
        
        // Thuật toán vẽ quả cầu hạt tím
        function createParticleSphere() {
            const canvas = document.getElementById('sphereCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            for(let i = 0; i < 1500; i++) {
                let phi = Math.acos(-1 + (2 * i) / 1500);
                let theta = Math.sqrt(1500 * Math.PI) * phi;
                particles.push({
                    x: 160 * Math.cos(theta) * Math.sin(phi),
                    y: 160 * Math.sin(theta) * Math.sin(phi),
                    z: 160 * Math.cos(phi)
                });
            }
            let angleX = 0; let angleY = 0;
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                angleY += 0.003; angleX += 0.001;
                particles.forEach(p => {
                    let x1 = p.x * Math.cos(angleY) - p.z * Math.sin(angleY);
                    let z1 = p.z * Math.cos(angleY) + p.x * Math.sin(angleY);
                    let y2 = p.y * Math.cos(angleX) - z1 * Math.sin(angleX);
                    let z2 = z1 * Math.cos(angleX) + p.y * Math.sin(angleX);
                    let scale = 300 / (300 + z2); 
                    let x2d = canvas.width/2 + x1 * scale;
                    let y2d = canvas.height/2 + y2 * scale;
                    ctx.beginPath();
                    ctx.arc(x2d, y2d, 1.8 * scale, 0, 2 * Math.PI);
                    ctx.fillStyle = `rgba(186, 104, 200, ${0.4 + (scale * 0.6)})`; 
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        }

        // Nút Không bỏ chạy
        function moveNoButton() {
            btnNo.style.position = 'fixed';
            const maxX = window.innerWidth - btnNo.clientWidth - 20;
            const maxY = window.innerHeight - btnNo.clientHeight - 20;
            btnNo.style.left = Math.max(10, Math.floor(Math.random() * maxX)) + 'px';
            btnNo.style.top = Math.max(10, Math.floor(Math.random() * maxY)) + 'px';
            
            let currentSize = parseInt(window.getComputedStyle(btnYes).fontSize);
            btnYes.style.fontSize = (currentSize + 2) + 'px';
        }
        btnNo.onmouseover = moveNoButton;
        btnNo.ontouchstart = moveNoButton;

        // BẤM NÚT CÓ - KHÔNG LỖI LẦM
        btnYes.onclick = function() {
            // Bật nhạc
            audio.play().catch(e => console.log("Lỗi nhạc:", e));

            // Ẩn UI Layer
            uiLayer.style.opacity = '0';
            setTimeout(() => { uiLayer.style.display = 'none'; }, 1000);

            // Hiện vũ trụ
            document.body.classList.add('space-mode');
            universe.style.opacity = '1';

            // Gọi quả cầu hạt
            createParticleSphere();

            // Gọi ảnh bay
            const imgSrcs = ['1.jpg.png', '2.jpg.png', '3.jpg.png', '4.jpg.png', '5.jpg', '6.jpg'];
            for(let i = 0; i < 100; i++) {
                let img = document.createElement('img');
                img.src = imgSrcs[i % imgSrcs.length];
                img.className = 'star-img';
                let size = Math.random() > 0.8 ? 70 : (Math.random() > 0.5 ? 55 : 40);
                img.style.width = size + 'px';
                img.style.height = (size * 1.3) + 'px'; 
                img.style.marginLeft = -(size/2) + 'px';
                img.style.marginTop = -(size/2) + 'px';
                let angle = Math.random() * 360; 
                let radius = 320 + Math.random() * 430; 
                let height = (Math.random() - 0.5) * 180; 
                let tiltX = (Math.random() - 0.5) * 50;
                let tiltY = (Math.random() - 0.5) * 50;
                img.style.transform = `rotateY(${angle}deg) translateZ(${radius}px) translateY(${height}px) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
                galaxy.appendChild(img);
            }
        };
    </script>
</body>
</html>
