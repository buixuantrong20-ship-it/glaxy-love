<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Thảo xinh ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh;
            /* Nền lúc đầu: Hồng pastel sang trọng, có chiều sâu */
            background: linear-gradient(135deg, #fce4ec 0%, #ffebee 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            text-align: center;
            transition: background 2s ease, color 2s ease; 
        }

        /* Chế độ vũ trụ: Sâu thẳm, huyền ảo hơn */
        body.space-mode {
            background: radial-gradient(circle at center, #11001c 0%, #000000 100%);
            color: white;
        }

        /* KHUNG CHỨA (UI Layer) theo phong cách Glassmorphism */
        #ui-layer {
            position: relative;
            z-index: 100;
            padding: 40px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: opacity 1s, visibility 1s;
        }

        img.main-gif {
            width: 220px;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            border: 3px solid white;
        }

        h1 {
            color: #d81b60;
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 35px;
            padding: 0 10px;
            text-shadow: 0 2px 5px rgba(216, 27, 96, 0.2);
            transition: color 2s, text-shadow 2s;
        }
        body.space-mode h1 {
            color: #ff9a9e;
            text-shadow: 0 0 15px rgba(255, 154, 158, 0.8);
        }

        .btn-group {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        button {
            padding: 18px 40px;
            font-size: 19px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Nút Có: Phong cách Gradient */
        #btnYes {
            background: linear-gradient(135deg, #ff4081 0%, #ff80ab 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(255, 64, 129, 0.4);
            position: relative;
            z-index: 999;
        }
        #btnYes:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 8px 25px rgba(255, 64, 129, 0.5);
        }

        /* Nút Không: Viền mờ */
        #btnNo {
            background-color: rgba(255, 255, 255, 0.6);
            color: #d81b60;
            border: 2px solid rgba(216, 27, 96, 0.5);
            z-index: 1000;
        }

        /* ================= VŨ TRỤ & QUẢ CẦU HẠT ================= */
        #universe {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            perspective: 1500px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 3s ease;
            z-index: 1;
            display: flex; justify-content: center; align-items: center;
        }

        #sphereCanvas {
            position: absolute;
            z-index: 2;
            pointer-events: none;
        }

        #galaxy {
            position: absolute; width: 0; height: 0;
            transform-style: preserve-3d;
            animation: spinGalaxy 40s linear infinite;
            z-index: 3;
            pointer-events: none;
        }
        
        @keyframes spinGalaxy {
            0% { transform: rotateX(-10deg) rotateY(0deg); }
            100% { transform: rotateX(-10deg) rotateY(360deg); }
        }

        .star-img {
            position: absolute;
            border-radius: 12px;
            object-fit: cover;
            /* Polaroid style */
            border: 4px solid white; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            transition: opacity 2s;
        }
    </style>
</head>
<body>

    <div id="universe">
        <canvas id="sphereCanvas" width="500" height="500"></canvas>
        <div id="galaxy"></div>
    </div>

    <div id="ui-layer">
        <img id="image" class="main-gif" src="https://media.tenor.com/ZhmAh5s0qHEAAAAi/peach-goma.gif" alt="Cute Cat">
        <h1 id="text">Thảo có muốn nhận quà của tao không ? 🎁</h1>
        <div class="btn-group">
            <button id="btnYes">Cóooooo ❤️</button>
            <button id="btnNo">Không thèm 😝</button>
        </div>
    </div>

    <audio id="myAudio" loop preload="auto">
        <source src="nhac.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        const text = document.getElementById('text');
        const image = document.getElementById('image');
        const uiLayer = document.getElementById('ui-layer');
        const audio = document.getElementById('myAudio');
        const universe = document.getElementById('universe');
        const galaxy = document.getElementById('galaxy');
        
        let yesSize = 20; let paddingV = 18; let paddingH = 40;
        let isMusicPlaying = false;

        function startMusic() {
            if (!isMusicPlaying) {
                audio.play().then(() => {
                    isMusicPlaying = true;
                }).catch(err => console.log("Chờ tương tác để bật nhạc...", err));
            }
        }

        document.body.addEventListener('click', startMusic);
        document.body.addEventListener('touchstart', startMusic);

        // Code làm nút Không bỏ chạy
        function moveNoButton() {
            startMusic();
            btnNo.style.position = 'fixed';
            const maxX = window.innerWidth - btnNo.clientWidth - 20;
            const maxY = window.innerHeight - btnNo.clientHeight - 20;
            btnNo.style.left = Math.max(10, Math.floor(Math.random() * maxX)) + 'px';
            btnNo.style.top = Math.max(10, Math.floor(Math.random() * maxY)) + 'px';

            yesSize += 7; paddingV += 4; paddingH += 7;
            btnYes.style.fontSize = yesSize + 'px';
            btnYes.style.padding = paddingV + 'px ' + paddingH + 'px';
        }

        btnNo.addEventListener('mouseover', moveNoButton);
        btnNo.addEventListener('touchstart', moveNoButton);
