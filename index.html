<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Thảo xinh ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background: linear-gradient(135deg, #fce4ec 0%, #ffebee 100%);
            font-family: 'Poppins', sans-serif; overflow: hidden; text-align: center;
            transition: background 1.5s ease; 
        }
        
        /* NỀN VŨ TRỤ */
        body.space-mode { background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); color: white; }
        
        /* BẦU TRỜI SAO (Chỉ hiện khi ra vũ trụ) */
        .stars {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0));
            background-repeat: repeat; background-size: 200px 200px;
            animation: twinkle 4s infinite linear; z-index: 0; opacity: 0; transition: opacity 2s;
        }
        @keyframes twinkle { 0% { opacity: 0.3; } 50% { opacity: 0.8; } 100% { opacity: 0.3; } }
        body.space-mode .stars { opacity: 1; }

        /* MÀN HÌNH TỎ TÌNH LÚC ĐẦU */
        #ui-layer {
            position: relative; z-index: 100; padding: 40px; background: rgba(255, 255, 255, 0.5);
            border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: opacity 0.8s, transform 0.8s;
        }
        img.main-gif { width: 220px; border-radius: 20px; margin-bottom: 25px; border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1);}
        h1 { color: #d81b60; font-size: 2em; margin-bottom: 35px; }
        
        .btn-group { display: flex; justify-content: center; gap: 25px; }
        button { padding: 18px 40px; font-size: 19px; font-weight: 600; border: none; border-radius: 50px; cursor: pointer; transition: 0.2s; }
        #btnYes { background: linear-gradient(135deg, #ff4081 0%, #ff80ab 100%); color: white; z-index: 999; box-shadow: 0 5px 15px rgba(255, 64, 129, 0.4);}
        #btnNo { background-color: rgba(255, 255, 255, 0.8); color: #d81b60; border: 2px solid rgba(216, 27, 96, 0.5); z-index: 1000; }

        /* VÒNG XOAY ẢNH 3D (Đẹp, to, rõ ràng) */
        #carousel-container {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 180px; height: 260px; perspective: 1000px;
            z-index: 2; opacity: 0; pointer-events: none; transition: opacity 2s ease;
        }
        
        #carousel {
            width: 100%; height: 100%; position: absolute; transform-style: preserve-3d;
            animation: spinCarousel 20s linear infinite;
        }
        @keyframes spinCarousel { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        .carousel-img {
            position: absolute; top: 0; left: 0; width: 180px; height: 260px;
            object-fit: cover; border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5), 0 0 40px rgba(173, 216, 230, 0.3);
            -webkit-box-reflect: below 15px linear-gradient(transparent, transparent, rgba(0,0,0,0.3));
        }

        /* Xếp 6 ảnh thành vòng tròn (360/6 = 60 độ) */
        .carousel-img:nth-child(1) { transform: rotateY(0deg) translateZ(260px); }
        .carousel-img:nth-child(2) { transform: rotateY(60deg) translateZ(260px); }
        .carousel-img:nth-child(3) { transform: rotateY(120deg) translateZ(260px); }
        .carousel-img:nth-child(4) { transform: rotateY(180deg) translateZ(260px); }
        .carousel-img:nth-child(5) { transform: rotateY(240deg) translateZ(260px); }
        .carousel-img:nth-child(6) { transform: rotateY(300deg) translateZ(260px); }

        /* HỘP LỜI CHÚC SANG TRỌNG BÊN DƯỚI */
        #final-message {
            position: absolute; bottom: 80px; width: 90%; max-width: 650px;
            background: rgba(20, 20, 30, 0.5); padding: 30px; border-radius: 20px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center; z-index: 3; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            opacity: 0; transform: translateY(50px); transition: opacity 2s ease, transform 2s ease;
            pointer-events: none;
        }
        #final-message h2 {
            font-family: 'Dancing Script', cursive; color: #ff9a9e; font-size: 3em;
            margin-bottom: 15px; text-shadow: 0 0 15px rgba(255, 154, 158, 0.5);
        }
        #final-message p { font-size: 17px; line-height: 1.6; color: #f0f0f0; font-weight: 400; }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div id="ui-layer">
        <img id="image" class="main-gif" src="https://media.tenor.com/ZhmAh5s0qHEAAAAi/peach-goma.gif" alt="Cute Cat">
        <h1 id="text">Thảo có muốn nhận quà 8/3 của tớ không nè? 🎁</h1>
        <div class="btn-group">
            <button id="btnYes">Cóooooo ❤️</button>
            <button id="btnNo">Không thèm 😝</button>
        </div>
    </div>

    <div id="carousel-container">
        <div id="carousel">
            <img class="carousel-img" src="1.jpg.png" alt="Ảnh 1">
            <img class="carousel-img" src="2.jpg.png" alt="Ảnh 2">
            <img class="carousel-img" src="3.jpg.png" alt="Ảnh 3">
            <img class="carousel-img" src="4.jpg.png" alt="Ảnh 4">
            <img class="carousel-img" src="5.jpg" alt="Ảnh 5">
            <img class="carousel-img" src="6.jpg" alt="Ảnh 6">
        </div>
    </div>

    <div id="final-message">
        <h2>Gửi Thảo xinh,</h2>
        <p>Chúc cậu luôn vui vẻ, rạng rỡ và ngập tràn hạnh phúc. Cứ mãi xinh xắn, tỏa sáng theo cách của riêng mình và nhận được thật nhiều niềm vui nha! ❤️</p>
    </div>

    <audio id="myAudio" loop preload="auto">
        <source src="nhac.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        const uiLayer = document.getElementById('ui-layer');
        const audio = document.getElementById('myAudio');
        const carouselContainer = document.getElementById('carousel-container');
        const finalMessage = document.getElementById('final-message');

        // Bật nhạc khi có tương tác
        let isMusicPlaying = false;
        function startMusic() {
            if (!isMusicPlaying) {
                audio.play().then(() => { isMusicPlaying = true; }).catch(e => console.log(e));
            }
        }
        document.body.addEventListener('click', startMusic);
        document.body.addEventListener('touchstart', startMusic);

        // Nút Không nhảy trốn
        function moveNoButton() {
            startMusic();
            btnNo.style.position = 'fixed';
            const maxX = window.innerWidth - btnNo.clientWidth - 20;
            const maxY = window.innerHeight - btnNo.clientHeight - 20;
            btnNo.style.left = Math.max(10, Math.floor(Math.random() * maxX)) + 'px';
            btnNo.style.top = Math.max(10, Math.floor(Math.random() * maxY)) + 'px';
            
            let currentSize = parseInt(window.getComputedStyle(btnYes).fontSize);
            btnYes.style.fontSize = (currentSize + 2) + 'px';
        }
        btnNo.onmouseover = moveNoButton;
        btnNo.ontouchstart = moveNoButton;

        // KHI BẤM CÓ -> CHUYỂN CẢNH SIÊU MƯỢT
        btnYes.onclick = function(e) {
            e.preventDefault();
            startMusic();

            // 1. Phóng to và mờ dần khung cũ
            uiLayer.style.transform = 'scale(1.2)';
            uiLayer.style.opacity = '0';
            setTimeout(() => { uiLayer.style.display = 'none'; }, 800);

            // 2. Hiện vũ trụ
            document.body.classList.add('space-mode');

            // 3. Hiện vòng xoay ảnh và khung chữ
            setTimeout(() => {
                carouselContainer.style.opacity = '1';
                finalMessage.style.opacity = '1';
                finalMessage.style.transform = 'translateY(0)'; // Chữ trượt mượt mà từ dưới lên
            }, 500);
        };
    </script>
</body>
</html>
