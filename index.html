<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Thảo xinh ❤️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background-color: #fce4ec; 
            font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; text-align: center;
            transition: background 2s ease; 
        }
        body.space-mode { background: radial-gradient(circle at center, #11001c 0%, #000000 100%); color: white; }
        #ui-layer { position: relative; z-index: 10; transition: transform 1s, opacity 1s; }
        img.main-gif { width: 250px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 1s; }
        h1 { color: #d81b60; font-size: 2em; margin-bottom: 30px; padding: 0 20px; text-shadow: 0 0 10px rgba(255,255,255,0.8); transition: color 2s; }
        body.space-mode h1 { color: #ff9a9e; }
        .btn-group { position: relative; width: 100%; display: flex; justify-content: center; gap: 30px; }
        button { padding: 15px 30px; font-size: 20px; font-weight: bold; border: none; border-radius: 30px; cursor: pointer; transition: transform 0.2s; }
        #btnYes { background-color: #ff4081; color: white; box-shadow: 0 5px 15px rgba(255, 64, 129, 0.4); }
        #btnNo { background-color: #fff; color: #d81b60; border: 2px solid #d81b60; position: relative; }

        /* VŨ TRỤ & QUẢ CẦU HẠT TÍM */
        #universe {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            perspective: 1000px; opacity: 0; pointer-events: none; transition: opacity 3s ease; z-index: 1;
            display: flex; justify-content: center; align-items: center;
        }
        #sphereCanvas { position: absolute; z-index: 2; }
        #galaxy { position: absolute; width: 0; height: 0; transform-style: preserve-3d; animation: spinGalaxy 30s linear infinite; z-index: 3; }
        
        @keyframes spinGalaxy {
            0% { transform: rotateX(-10deg) rotateY(0deg); }
            100% { transform: rotateX(-10deg) rotateY(360deg); }
        }
        .star-img {
            position: absolute; border-radius: 8px; box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            object-fit: cover; border: 2px solid rgba(255,255,255,0.7); 
        }
    </style>
</head>
<body>

    <div id="universe">
        <canvas id="sphereCanvas" width="400" height="400"></canvas>
        <div id="galaxy"></div>
    </div>

    <div id="ui-layer">
        <img id="image" class="main-gif" src="https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif" alt="Cute Cat">
        <h1 id="text">Thảo có muốn nhận quà của tớ không ? 🎁</h1>
        <div class="btn-group">
            <button id="btnYes">Cóooooo ❤️</button>
            <button id="btnNo">Không thèm 😝</button>
        </div>
    </div>

    <audio id="myAudio" loop preload="auto">
        <source src="nhac.mp3" type="audio/mpeg">
    </audio>

            }
