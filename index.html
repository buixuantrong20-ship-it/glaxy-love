<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Thảo xinh ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        /* BẦU TRỜI SAO LẤP LÁNH */
        .stars {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 4s infinite linear;
            z-index: 0;
        }
        @keyframes twinkle { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* VÒNG XOAY ẢNH 3D */
        .carousel-container {
            position: relative;
            width: 220px;
            height: 320px;
            perspective: 1200px;
            z-index: 2;
            margin-top: -120px; /* Đẩy lên trên một chút nhường chỗ cho text */
        }

        .carousel {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            animation: spin 25s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .carousel img {
            position: absolute;
            top: 0; left: 0;
            width: 220px;
            height: 320px;
            object-fit: cover;
            border-radius: 10px;
            /* Viền sáng phát quang giống link mẫu */
            border: 2px solid rgba(173, 216, 230, 0.6);
            box-shadow: 0 0 15px rgba(173, 216, 230, 0.4), 0 0 30px rgba(255, 105, 180, 0.3);
            /* Chống nhiễu hình */
            -webkit-box-reflect: below 10px linear-gradient(transparent, transparent, rgba(0,0,0,0.2));
        }

        /* Chia đều 6 ảnh thành hình lục giác (360 độ / 6 = 60 độ) */
        .carousel img:nth-child(1) { transform: rotateY(0deg) translateZ(280px); }
        .carousel img:nth-child(2) { transform: rotateY(60deg) translateZ(280px); }
        .carousel img:nth-child(3) { transform: rotateY(120deg) translateZ(280px); }
        .carousel img:nth-child(4) { transform: rotateY(180deg) translateZ(280px); }
        .carousel img:nth-child(5) { transform: rotateY(240deg) translateZ(280px); }
        .carousel img:nth-child(6) { transform: rotateY(300deg) translateZ(280px); }

        /* HỘP THƯ LỜI CHÚC (Glassmorphism) */
        .message-box {
            position: absolute;
            bottom: 90px;
            width: 90%;
            max-width: 600px;
            background: rgba(20, 20, 30, 0.6); /* Nền đen mờ */
            padding: 25px 30px;
            border-radius: 15px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            z-index: 3;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .message-box h2 {
            font-family: 'Dancing Script', cursive;
            color: #ff80ab;
            font-size: 2.8em;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(255, 128, 171, 0.6);
        }

        .message-box p {
            font-size: 16px;
            line-height: 1.7;
            color: #e0e0e0;
        }

        /* THANH PHÁT NHẠC */
        .audio-player {
            position: absolute;
            bottom: 20px;
            z-index: 10;
            width: 300px;
            opacity: 0.8;
            transition: opacity 0.3s;
            border-radius: 30px;
        }
        .audio-player:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="carousel-container">
        <div class="carousel">
            <img src="1.jpg.png" alt="Ảnh 1">
            <img src="2.jpg.png" alt="Ảnh 2">
            <img src="3.jpg.png" alt="Ảnh 3">
            <img src="4.jpg.png" alt="Ảnh 4">
            <img src="5.jpg" alt="Ảnh 5">
            <img src="6.jpg" alt="Ảnh 6">
        </div>
    </div>

    <div class="message-box">
        <h2>Gửi Thảo xinh,</h2>
        <p>Chúc cậu luôn vui vẻ, rạng rỡ và ngập tràn hạnh phúc. Cứ mãi xinh xắn và tỏa sáng theo cách của riêng mình nha! ❤️</p>
    </div>

    <audio class="audio-player" controls autoplay loop>
        <source src="nhac.mp3" type="audio/mpeg">
        Trình duyệt không hỗ trợ phát nhạc.
    </audio>

</body>
</html>
