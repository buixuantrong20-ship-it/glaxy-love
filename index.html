<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Thảo xinh ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background: linear-gradient(135deg, #fce4ec 0%, #ffebee 100%);
            font-family: 'Poppins', sans-serif; overflow: hidden; text-align: center;
            transition: background 2s ease; 
        }
        
        /* NỀN VŨ TRỤ SANG CHẢNH (Tím huyền ảo, không đen ngòm) */
        body.space-mode { background: radial-gradient(circle at center, #2e1746 0%, #050508 100%); color: white; }
        
        #ui-layer {
            position: relative; z-index: 999999; padding: 40px; background: rgba(255, 255, 255, 0.4);
            border-radius: 30px; backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        img.main-gif { width: 220px; border-radius: 20px; margin-bottom: 25px; border: 3px solid white; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        h1 { color: #d81b60; font-size: 2em; margin-bottom: 35px; }
        
        .btn-group { display: flex; justify-content: center; gap: 25px; }
        button { padding: 18px 40px; font-size: 19px; font-weight: 600; border: none; border-radius: 50px; cursor: pointer; transition: 0.2s; }
        #btnYes { background: linear-gradient(135deg, #ff4081 0%, #ff80ab 100%); color: white; box-shadow: 0 5px 15px rgba(255, 64, 129, 0.4); }
        #btnNo { background-color: rgba(255, 255, 255, 0.8); color: #d81b60; border: 2px solid rgba(216, 27, 96, 0.5); }

        #universe {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            opacity: 0; transition: opacity 2s ease; z-index: 1; pointer-events: none;
        }
        body.space-mode #universe { pointer-events: auto; } 

        #threejs-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; outline: none; }

        #bottom-text {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            font-size: 20px; font-weight: 600; color: #ffcae0; opacity: 0; transition: 2s;
            text-shadow: 0 0 15px rgba(255, 100, 150, 0.8); z-index: 10;
        }
    </style>
</head>
<body>
    
    <div id="universe">
        <canvas id="threejs-canvas"></canvas>
    </div>
    
    <div id="bottom-text">Chúc Thảo 8/3 luôn vui vẻ, rạng rỡ và ngập tràn hạnh phúc. Tỏa sáng như một thiên hà nhé! ❤️</div>

    <div id="ui-layer">
        <img id="image" class="main-gif" src="https://media.tenor.com/ZhmAh5s0qHEAAAAi/peach-goma.gif" alt="Cute Cat">
        <h1 id="text">Thảo có muốn nhận quà 8/3 của tớ không nè? 🎁</h1>
        <div class="btn-group">
            <button id="btnYes" onclick="acceptLove()">Cóooooo ❤️</button>
            <button id="btnNo" onmouseover="moveNoButton()" ontouchstart="moveNoButton()">Không thèm 😝</button>
        </div>
    </div>

    <audio id="myAudio" loop preload="auto">
        <source src="nhac.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        const uiLayer = document.getElementById('ui-layer');
        const audio = document.getElementById('myAudio');
        const universe = document.getElementById('universe');
        const bottomText = document.getElementById('bottom-text');
        const canvas = document.getElementById('threejs-canvas');

        let scene, camera, renderer, controls, galaxyGroup;

        function startMusic() {
            audio.play().catch(e => console.log("Chờ tương tác"));
        }
        document.body.addEventListener('click', startMusic);

        function moveNoButton() {
            btnNo.style.position = 'fixed';
            const maxX = window.innerWidth - btnNo.clientWidth - 20;
            const maxY = window.innerHeight - btnNo.clientHeight - 20;
            btnNo.style.left = Math.max(10, Math.floor(Math.random() * maxX)) + 'px';
            btnNo.style.top = Math.max(10, Math.floor(Math.random() * maxY)) + 'px';
        }

        function initThreeJS() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 100, 500);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            galaxyGroup = new THREE.Group();
            scene.add(galaxyGroup);

            // QUẢ CẦU TÍM PHÁT SÁNG MẠNH
            const geometry = new THREE.IcosahedronGeometry(130, 20); // Dùng hình khối cầu 20 mặt cho mịn
            const material = new THREE.PointsMaterial({
                size: 2, color: 0xcc88ff, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.8
            });
            const sphere = new THREE.Points(geometry, material);
            galaxyGroup.add(sphere);

            // VÀNH ĐAI ẢNH TO RÕ
            const textureLoader = new THREE.TextureLoader();
            const imgSrcs = ['1.jpg.png', '2.jpg.png', '3.jpg.png', '4.jpg.png', '5.jpg', '6.jpg'];
            const totalImages = 60; 
            
            for (let i = 0; i < totalImages; i++) {
                // Tăng kích thước ảnh lên cho đẹp
                const planeGeo = new THREE.PlaneGeometry(60, 85); 
                const mat = new THREE.MeshBasicMaterial({
                    map: textureLoader.load(imgSrcs[i % imgSrcs.length]),
                    side: THREE.DoubleSide, transparent: true
                });
                const mesh = new THREE.Mesh(planeGeo, mat);

                const angle = Math.random() * Math.PI * 2;
                const radius = 250 + Math.random() * 200; 
                mesh.position.set(Math.cos(angle) * radius, (Math.random() - 0.5) * 40, Math.sin(angle) * radius);
                mesh.rotation.y = -angle + Math.PI / 2;
                galaxyGroup.add(mesh);
            }
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            galaxyGroup.rotation.y += 0.002;
            renderer.render(scene, camera);
        }

        window.acceptLove = function() {
            startMusic();
            uiLayer.style.opacity = '0';
            setTimeout(() => { uiLayer.style.display = 'none'; }, 500);
            document.body.classList.add('space-mode');
            universe.style.opacity = '1';
            bottomText.style.opacity = '1';
            initThreeJS();
        };
    </script>
</body>
</html>
