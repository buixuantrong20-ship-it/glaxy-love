<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Thảo xinh ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background: linear-gradient(135deg, #fce4ec 0%, #ffebee 100%);
            font-family: 'Poppins', sans-serif; overflow: hidden; text-align: center;
            transition: background 2s ease; 
        }
        
        body.space-mode { background: radial-gradient(circle at center, #0a0015 0%, #000000 100%); color: white; }
        
        /* KHÓA CỨNG LỚP NÀY LÊN TRÊN CÙNG ĐỂ CHỐNG LIỆT NÚT */
        #ui-layer {
            position: relative; z-index: 999999 !important; padding: 40px; background: rgba(255, 255, 255, 0.4);
            border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: opacity 1s; pointer-events: auto !important;
        }
        img.main-gif { width: 220px; border-radius: 20px; margin-bottom: 25px; border: 3px solid white; pointer-events: none; }
        h1 { color: #d81b60; font-size: 2em; margin-bottom: 35px; pointer-events: none; }
        
        .btn-group { display: flex; justify-content: center; gap: 25px; position: relative; z-index: 1000000; }
        button { padding: 18px 40px; font-size: 19px; font-weight: 600; border: none; border-radius: 50px; cursor: pointer; transition: 0.2s; pointer-events: auto; }
        #btnYes { background: linear-gradient(135deg, #ff4081 0%, #ff80ab 100%); color: white; box-shadow: 0 5px 15px rgba(255, 64, 129, 0.4); }
        #btnNo { background-color: rgba(255, 255, 255, 0.8); color: #d81b60; border: 2px solid rgba(216, 27, 96, 0.5); }

        /* VŨ TRỤ (Trói chặt lại lúc đầu, đéo cho cướp cảm ứng) */
        #universe {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            opacity: 0; transition: opacity 2s ease; z-index: 1; pointer-events: none !important;
        }
        body.space-mode #universe { pointer-events: auto !important; } 

        #threejs-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; outline: none; }

        #marquee-text {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            font-size: 20px; font-weight: 600; color: #ff9a9e; opacity: 0; transition: 2s;
            text-shadow: 0 0 15px rgba(255, 154, 158, 0.8); z-index: 10; pointer-events: none;
        }
    </style>
</head>
<body>
    
    <div id="universe">
        <canvas id="threejs-canvas"></canvas>
    </div>
    
    <div id="marquee-text">Chúc Thảo 8/3 luôn vui vẻ, rạng rỡ và ngập tràn hạnh phúc. Tỏa sáng như một thiên hà nhé! ❤️</div>

    <div id="ui-layer">
        <img id="image" class="main-gif" src="https://media.tenor.com/ZhmAh5s0qHEAAAAi/peach-goma.gif" alt="Cute Cat">
        <h1 id="text">Thảo có muốn nhận quà 8/3 của tớ không nè? 🎁</h1>
        <div class="btn-group">
            <button id="btnYes" onclick="acceptLove()">Cóooooo ❤️</button>
            <button id="btnNo" onmouseover="moveNoButton()" ontouchstart="moveNoButton()">Không thèm 😝</button>
        </div>
    </div>

    <audio id="myAudio" loop preload="auto">
        <source src="nhac.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        const uiLayer = document.getElementById('ui-layer');
        const audio = document.getElementById('myAudio');
        const universe = document.getElementById('universe');
        const marqueeText = document.getElementById('marquee-text');
        const canvas = document.getElementById('threejs-canvas');

        let scene, camera, renderer, controls, galaxyGroup;
        let isMusicPlaying = false;

        // Ép bật nhạc lúc bấm lung tung
        function startMusic() {
            if (!isMusicPlaying) {
                audio.play().then(() => { isMusicPlaying = true; }).catch(e => console.log("Trình duyệt chờ tương tác"));
            }
        }
        document.body.addEventListener('click', startMusic);

        // Nút Không nhảy trốn
        function moveNoButton() {
            startMusic();
            btnNo.style.position = 'fixed';
            const maxX = window.innerWidth - btnNo.clientWidth - 20;
            const maxY = window.innerHeight - btnNo.clientHeight - 20;
            btnNo.style.left = Math.max(10, Math.floor(Math.random() * maxX)) + 'px';
            btnNo.style.top = Math.max(10, Math.floor(Math.random() * maxY)) + 'px';
            
            let currentSize = parseInt(window.getComputedStyle(btnYes).fontSize);
            btnYes.style.fontSize = (currentSize + 2) + 'px';
        }

        // VẼ 3D SIÊU MƯỢT
        function initThreeJS() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 100, 500);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enableZoom = true;
            controls.minDistance = 200;
            controls.maxDistance = 800;

            galaxyGroup = new THREE.Group();
            scene.add(galaxyGroup);

            // TẠO QUẢ CẦU
            const numPoints = 2000;
            const sphereRadius = 120;
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];

            for (let i = 0; i < numPoints; i++) {
                const u = Math.random();
                const v = Math.random();
                const theta = 2 * Math.PI * u;
                const phi = Math.acos(2 * v - 1);
                const x = sphereRadius * Math.sin(phi) * Math.cos(theta);
                const y = sphereRadius * Math.sin(phi) * Math.sin(theta);
                const z = sphereRadius * Math.cos(phi);
                positions.push(x, y, z);
                colors.push(0.8, 0.4 + Math.random() * 0.5, 0.9);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 2.5, vertexColors: true, blending: THREE.AdditiveBlending,
                transparent: true, depthWrite: false
            });

            const particleSphere = new THREE.Points(geometry, material);
            galaxyGroup.add(particleSphere);

            // TẠO VÀNH ĐAI ẢNH CỦA THẢO
            const textureLoader = new THREE.TextureLoader();
            const imgSrcs = ['1.jpg.png', '2.jpg.png', '3.jpg.png', '4.jpg.png', '5.jpg', '6.jpg'];
            
            const materials = imgSrcs.map(src => {
                return new THREE.MeshBasicMaterial({
                    map: textureLoader.load(src),
                    side: THREE.DoubleSide,
                    transparent: true
                });
            });

            const totalImages = 80; 
            for (let i = 0; i < totalImages; i++) {
                const planeGeo = new THREE.PlaneGeometry(45, 65); // Kích thước ảnh
                const mat = materials[i % materials.length];
                const mesh = new THREE.Mesh(planeGeo, mat);

                const angle = Math.random() * Math.PI * 2;
                const radius = 200 + Math.random() * 250; 
                
                mesh.position.x = Math.cos(angle) * radius;
                mesh.position.z = Math.sin(angle) * radius;
                mesh.position.y = (Math.random() - 0.5) * 60; 

                mesh.rotation.y = -angle + Math.PI / 2;
                mesh.rotation.x = (Math.random() - 0.5) * 0.4;
                mesh.rotation.z = (Math.random() - 0.5) * 0.2;

                galaxyGroup.add(mesh);
            }

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            if(galaxyGroup) {
                galaxyGroup.rotation.y += 0.002;
            }
            renderer.render(scene, camera);
        }

        // ĐÂY LÀ HÀM BẤM NÚT (Đã biến thành hàm toàn cục)
        window.acceptLove = function() {
            startMusic();
            
            // Xóa khung ngoài
            uiLayer.style.opacity = '0';
            setTimeout(() => { uiLayer.style.display = 'none'; }, 1000);

            // Bật vũ trụ
            document.body.classList.add('space-mode');
            universe.style.opacity = '1';
            marqueeText.style.opacity = '1';

            // Dựng 3D
            initThreeJS();
        };
    </script>
</body>
</html>
