<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Thảo xinh ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background: linear-gradient(135deg, #fce4ec 0%, #ffebee 100%);
            font-family: 'Poppins', sans-serif; overflow: hidden; text-align: center;
            transition: background 2s ease; 
        }
        
        /* Nền vũ trụ */
        body.space-mode { background: radial-gradient(circle at center, #11001c 0%, #000000 100%); color: white; }
        
        /* CHỐNG ĐÈ NÚT - ÉP KHUNG UI LÊN TRÊN CÙNG */
        #ui-layer {
            position: relative; z-index: 99999; padding: 40px; background: rgba(255, 255, 255, 0.4);
            border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: opacity 1s;
        }
        img.main-gif { width: 220px; border-radius: 20px; margin-bottom: 25px; border: 3px solid white; pointer-events: none; }
        h1 { color: #d81b60; font-size: 2em; margin-bottom: 35px; pointer-events: none; }
        
        .btn-group { display: flex; justify-content: center; gap: 25px; position: relative; z-index: 100000; }
        button { padding: 18px 40px; font-size: 19px; font-weight: 600; border: none; border-radius: 50px; cursor: pointer; transition: 0.2s; }
        
        /* ÉP Z-INDEX CAO CHÓT VÓT CHO 2 NÚT NÀY */
        #btnYes { position: relative; background: linear-gradient(135deg, #ff4081 0%, #ff80ab 100%); color: white; z-index: 999999; box-shadow: 0 5px 15px rgba(255, 64, 129, 0.4); }
        #btnNo { position: relative; background-color: rgba(255, 255, 255, 0.6); color: #d81b60; border: 2px solid rgba(216, 27, 96, 0.5); z-index: 1000000; }

        /* LỚP VŨ TRỤ CHỨA 3D */
        #universe {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            perspective: 1200px; opacity: 0; transition: opacity 2s ease; z-index: 1;
            pointer-events: none; /* TRÓI THẰNG 3D LẠI KHÔNG CHO CƯỚP CLICK */
        }
        
        /* Chỉ thả xích cho 3D hoạt động khi màn hình vũ trụ bật lên */
        body.space-mode #universe { pointer-events: auto; } 

        #particleCanvas { position: absolute; top: 0; left: 0; z-index: 2; }
        
        /* DẢI NGÂN HÀ ẢNH ĐÃ ĐƯỢC KÉO RA GIỮA MÀN HÌNH */
        #galaxy { 
            position: absolute; 
            top: 50%; left: 50%; 
            width: 0; height: 0; transform-style: preserve-3d; 
            animation: spinGalaxy 35s linear infinite; z-index: 3; pointer-events: none;
        }
        
        @keyframes spinGalaxy { 
            0% { transform: rotateX(-10deg) rotateY(0deg); } 
            100% { transform: rotateX(-10deg) rotateY(360deg); } 
        }
        
        /* ẢNH ĐÃ LÀM TO RA (80x110) */
        .star-img { 
            position: absolute; border-radius: 8px; object-fit: cover; 
            border: 3px solid rgba(255,255,255,0.8); 
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            width: 80px; height: 110px; 
            margin-left: -40px; margin-top: -55px; pointer-events: none;
        }

        /* Chữ chạy dưới đáy */
        #marquee-text {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            font-size: 22px; font-weight: 600; color: #ff9a9e; opacity: 0; transition: 2s;
            text-shadow: 0 0 10px rgba(255, 154, 158, 0.8); z-index: 10; pointer-events: none;
        }
    </style>
</head>
<body>
    
    <div id="universe">
        <canvas id="particleCanvas"></canvas>
        <div id="galaxy"></div>
    </div>
    
    <div id="marquee-text">Chúc Thảo 8/3 luôn vui vẻ, rạng rỡ và ngập tràn hạnh phúc. Cứ mãi xinh xắn và tỏa sáng theo cách của riêng mình nha! ❤️</div>

    <div id="ui-layer">
        <img id="image" class="main-gif" src="https://media.tenor.com/ZhmAh5s0qHEAAAAi/peach-goma.gif" alt="Cute Cat">
        <h1 id="text">Thảo có muốn nhận quà 8/3 của tớ không nè? 🎁</h1>
        <div class="btn-group">
            <button id="btnYes">Cóooooo ❤️</button>
            <button id="btnNo">Không thèm 😝</button>
        </div>
    </div>

    <audio id="myAudio" loop preload="auto">
        <source src="nhac.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        const uiLayer = document.getElementById('ui-layer');
        const audio = document.getElementById('myAudio');
        const universe = document.getElementById('universe');
        const galaxy = document.getElementById('galaxy');
        const marqueeText = document.getElementById('marquee-text');
        const canvas = document.getElementById('particleCanvas');

        let scene, camera, renderer, controls, spherePoints;

        // Bật nhạc
        let isMusicPlaying = false;
        function startMusic() {
            if (!isMusicPlaying) {
                audio.play().then(() => { isMusicPlaying = true; }).catch(e => console.log(e));
            }
        }
        document.body.addEventListener('click', startMusic);
        document.body.addEventListener('touchstart', startMusic, {passive: true});

        // Nút chạy
        function moveNoButton(e) {
            if(e) e.preventDefault();
            startMusic();
            btnNo.style.position = 'fixed';
            const maxX = window.innerWidth - btnNo.clientWidth - 20;
            const maxY = window.innerHeight - btnNo.clientHeight - 20;
            btnNo.style.left = Math.max(10, Math.floor(Math.random() * maxX)) + 'px';
            btnNo.style.top = Math.max(10, Math.floor(Math.random() * maxY)) + 'px';
            
            let currentSize = parseInt(window.getComputedStyle(btnYes).fontSize);
            btnYes.style.fontSize = (currentSize + 2) + 'px';
        }
        btnNo.addEventListener('mouseover', moveNoButton);
        btnNo.addEventListener('touchstart', moveNoButton, {passive: false});

        // VẼ QUẢ CẦU 3D
        function initThreeJS() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 400);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enableZoom = true;
            controls.enablePan = false;
            controls.minDistance = 200;
            controls.maxDistance = 600;

            const numPointsSphere = 1500;
            const sphereRadius = 130;
            const sphereVertices = [];
            const sphereColors = [];

            for (let i = 0; i < numPointsSphere; i++) {
                const u = Math.random();
                const v = Math.random();
                const theta = 2 * Math.PI * u;
                const phi = Math.acos(2 * v - 1);
                const x = sphereRadius * Math.sin(phi) * Math.cos(theta);
                const y = sphereRadius * Math.sin(phi) * Math.sin(theta);
                const z = sphereRadius * Math.cos(phi);
                sphereVertices.push(x, y, z);
                
                const colorVal = 0.4 + (Math.random() * 0.6);
                sphereColors.push(0.8, colorVal, 0.9); 
            }

            const sphereGeometry = new THREE.BufferGeometry();
            sphereGeometry.setAttribute('position', new THREE.Float32BufferAttribute(sphereVertices, 3));
            sphereGeometry.setAttribute('color', new THREE.Float32BufferAttribute(sphereColors, 3));

            const sphereMaterial = new THREE.PointsMaterial({
                size: 2.5, vertexColors: true, blending: THREE.AdditiveBlending,
                transparent: true, depthWrite: false, sizeAttenuation: true
            });

            spherePoints = new THREE.Points(sphereGeometry, sphereMaterial);
            scene.add(spherePoints);

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            spherePoints.rotation.y += 0.003; 
            renderer.render(scene, camera);
        }

        // TẠO VÀNH ĐAI ẢNH
        function addImagesToGalaxy() {
            const imgSrcs = ['1.jpg.png', '2.jpg.png', '3.jpg.png', '4.jpg.png', '5.jpg', '6.jpg'];
            const totalImages = 150; 
            
            for(let i = 0; i < totalImages; i++) {
                let img = document.createElement('img');
                img.src = imgSrcs[i % imgSrcs.length];
                img.className = 'star-img';

                let angle = Math.random() * 360; 
                let radius = 280 + Math.random() * 350; 
                let heightOffset = (Math.random() - 0.5) * 60; 
                let tiltX = (Math.random() - 0.5) * 20; 

                img.style.transform = `rotateY(${angle}deg) translateZ(${radius}px) translateY(${heightOffset}px) rotateX(${tiltX}deg)`;
                galaxy.appendChild(img);
            }
        }

        // HÀM CLICK CHUẨN XỊN CHỐNG LIỆT
        function acceptLove(e) {
            if(e) e.preventDefault();
            startMusic();

            uiLayer.style.opacity = '0';
            setTimeout(() => { uiLayer.style.display = 'none'; }, 1000);

            document.body.classList.add('space-mode');
            universe.style.opacity = '1';
            marqueeText.style.opacity = '1';

            initThreeJS();
            addImagesToGalaxy();
        }

        // Bắt cả sự kiện click chuột (máy tính) và chạm ngón tay (điện thoại)
        btnYes.addEventListener('click', acceptLove);
        btnYes.addEventListener('touchstart', acceptLove, {passive: false});

    </script>
</body>
</html>
